                        <!-- Top clamp handle -->
                        <rect x="85" y="20" width="15" height="8" rx="2" fill="#6B7280"></rect>
                        
                        <!-- Vertical screw/compression rod -->
                        <rect x="28" y="25" width="8" height="70" fill="#6B7280"></rect>
                        
                        <!-- Screw threads -->
                        <rect x="25" y="30" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        <rect x="25" y="37" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        <rect x="25" y="44" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        <rect x="25" y="51" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        <rect x="25" y="58" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        <rect x="25" y="65" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        <rect x="25" y="72" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        <rect x="25" y="79" width="14" height="3" rx="1.5" fill="#9CA3AF"></rect>
                        
                        <!-- JS File Icon (replacing folder) -->
                        <g transform="translate(50, 35)">
                            <!-- File background -->
                            <path d="M0 5 L0 35 Q0 40 5 40 L25 40 Q30 40 30 35 L30 10 L20 0 L5 0 Q0 0 0 5 Z" fill="#3178C6" stroke="#235A97" stroke-width="1.5"></path>
                            
                            <!-- File fold -->
                            <path d="M20 0 L20 8 Q20 10 22 10 L30 10" stroke="#235A97" stroke-width="1.5" fill="none"></path>
                            
                            <!-- JS text -->
                            <text x="15" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">JS</text>
                        </g>
                        
                        <!-- Bottom clamp part -->
                        <path d="M15 85 L35 85 L45 95 L85 95 L95 85 L105 85 Q110 85 110 90 L110 95 Q110 100 105 100 L95 100 L85 100 L45 100 L35 100 L15 100 Q10 85 15 85 Z" fill="#9CA3AF" stroke="#6B7280" stroke-width="1"></path>
                        
                        <!-- Bottom clamp handle -->
                        <rect x="85" y="92" width="15" height="8" rx="2" fill="#6B7280"></rect>
                        
                        <!-- Base platform -->
                        <ellipse cx="10" cy="110" rx="8" ry="6" fill="#9CA3AF"></ellipse>
                        <ellipse cx="110" cy="110" rx="8" ry="6" fill="#9CA3AF"></ellipse>
                        <rect x="18" y="107" width="84" height="6" fill="#9CA3AF"></rect>
                        <rect x="25" y="104" width="70" height="12" rx="6" fill="#6B7280"></rect>
                        
                        <!-- Compression indication arrows -->
                        <g stroke="#EF4444" stroke-width="2" fill="none" opacity="0.8">
                            <!-- Top arrow pointing down -->
                            <path d="M45 12 L45 22 M40 17 L45 22 L50 17"></path>
                            <!-- Bottom arrow pointing up -->
                            <path d="M45 108 L45 98 M40 103 L45 98 L50 103"></path>
